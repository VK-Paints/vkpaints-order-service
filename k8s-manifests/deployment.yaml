apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-deploy
  namespace: vkpaints-dev-ns
spec:
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: order-service
            topologyKey: "kubernetes.io/hostname"
      containers:
      - name: order-container
        image: ghcr.io/vk-paints/vkpaints-order-service:v1.0.0
        imagePullPolicy: IfNotPresent
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        envFrom:
        - configMapRef:
            name: order-config
        - secretRef:
            name: order-service-secret
        livenessProbe:
          httpGet:
            path: /health
            port: 3004
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 3004
          initialDelaySeconds: 5
          periodSeconds: 10

        ports:
        - containerPort: 3004

